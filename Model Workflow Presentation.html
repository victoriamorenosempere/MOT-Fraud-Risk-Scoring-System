  const iframe = document.getElementById('s'+(i+1));
  const blob = new Blob([slideContents[i]], {type: 'text/html'});
  iframe.src = URL.createObjectURL(blob);

function jump(n){
  document.getElementById('s'+cur).classList.remove('active');
  document.querySelectorAll('.ndot')[cur-1].classList.remove('on');
  cur = n;
  document.getElementById('s'+cur).classList.add('active');
  document.querySelectorAll('.ndot')[cur-1].classList.add('on');
  document.getElementById('cnt').textContent = cur + ' / 5';
  document.getElementById('slbl').textContent = labels[cur-1];
}

function go(d){
  let n = cur + d;
  if(n<1) n=1;
  if(n>5) n=5;
  jump(n);
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key===' ') go(1);
  if(e.key==='ArrowLeft') go(-1);
  if(e.key>='1'&&e.key<='5') jump(parseInt(e.key));
});
</script>
